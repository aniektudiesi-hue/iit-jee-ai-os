<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IIT JEE AI Discipline OS</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>IIT JEE AI Discipline OS</h1>
            <nav class="nav-links">
                <a href="/">Tasks</a>
                <a href="/sleep">Sleep</a>
                <a href="/dashboard" class="active">Dashboard</a>
            </nav>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="points-display">0</div>
                <div class="stat-label">Total Points</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="discipline-display">0%</div>
                <div class="stat-label">Discipline Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="sleep-display">0h</div>
                <div class="stat-label">Sleep</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="fatigue-display">0</div>
                <div class="stat-label">Fatigue</div>
            </div>
        </div>

        <div class="card">
            <h3>Daily Summary</h3>
            <div class="summary-grid">
                <div class="summary-item">
                    <span class="summary-label">Completed Tasks:</span>
                    <span class="summary-value" id="completed-tasks">0</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Missed Tasks:</span>
                    <span class="summary-value" id="missed-tasks">0</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Locked Tasks:</span>
                    <span class="summary-value" id="locked-tasks">0</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Study Time:</span>
                    <span class="summary-value" id="study-time">0h</span>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="card">
                <h3>Study Time Distribution</h3>
                <div class="chart-container">
                    <canvas id="studyChart"></canvas>
                </div>
            </div>
            <div class="card">
                <h3>Subject Performance</h3>
                <div class="chart-container">
                    <canvas id="subjectChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Weekly Productivity</h3>
            <div class="chart-container">
                <canvas id="productivityChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3>Sleep Compliance</h3>
            <div class="chart-container">
                <canvas id="sleepChart"></canvas>
            </div>
        </div>
    </div>

    <script src="/static/dashboard.js"></script>
</body>
</html>
