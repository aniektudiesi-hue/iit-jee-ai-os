<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIT JEE AI Discipline OS</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>IIT JEE AI Discipline OS</h1>
            <nav class="nav-links">
                <a href="/" class="active">Tasks</a>
                <a href="/sleep">Sleep</a>
                <a href="/dashboard">Dashboard</a>
            </nav>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="points-display">0</div>
                <div class="stat-label">Total Points</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="discipline-display">0%</div>
                <div class="stat-label">Discipline Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="sleep-display">0h</div>
                <div class="stat-label">Sleep (Last 24h)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="fatigue-display">0</div>
                <div class="stat-label">Fatigue Level</div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="margin: 0;">Today's Schedule</h2>
                <button class="btn btn-primary" id="generate-btn">Regenerate Schedule</button>
            </div>
            <div id="task-list" class="task-list">
                <!-- Tasks will be loaded here -->
                <div style="text-align: center; padding: 2rem; color: var(--text-muted);">
                    Loading your discipline schedule...
                </div>
            </div>
        </div>

        <div class="card" id="active-task-card" style="display: none; border-left: 8px solid var(--primary);">
            <h3>Current Active Task</h3>
            <div id="active-task-content"></div>
            <div style="margin-top: 1rem; display: flex; gap: 1rem;">
                <button class="btn btn-primary" id="start-btn">Start Task (10 min grace)</button>
                <button class="btn" style="background: #10b981;" id="focus-btn">Enter Focus Mode</button>
            </div>
        </div>

        <div class="card" id="past-tasks-card" style="display: none;">
            <h3>Previous Tasks (Completed & Missed)</h3>
            <div id="past-task-list" class="task-list"></div>
        </div>
    </div>

    <!-- Focus Mode Modal -->
    <div id="focus-modal" class="modal" style="display: none;">
        <div class="focus-container">
            <div class="focus-header">
                <h2 id="focus-title">Focus Mode</h2>
                <button class="btn-close" id="exit-focus-btn">&times;</button>
            </div>
            <div class="focus-timer">
                <div class="timer-display" id="timer-display">00:00</div>
                <div class="timer-label">Time Remaining</div>
            </div>
            <div class="focus-task-info">
                <div id="focus-task-details"></div>
            </div>
            <div class="focus-controls">
                <button class="btn btn-success" id="complete-focus-btn">Complete Task</button>
                <button class="btn btn-danger" id="pause-focus-btn">Pause</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
