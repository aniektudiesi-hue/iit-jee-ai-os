services:
  - type: web
    name: iit-jee-ai-os
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iit-jee-db
          property: connectionString

databases:
  - name: iit-jee-db
    plan: free
    region: oregon
